<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 𝑽𝑰𝑷 °•◈</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00ffea; --bg: #050505; --card: #121212; --win: #00ff88; --loss: #ff4444; --accent: #ffd700; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    #loginSection { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; }
    input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; text-align: center; outline: none; }
    .login-btn { width: 100%; padding: 12px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
    #mainApp { display: none; width: 100%; max-width: 500px; }
    .header { text-align: center; color: var(--primary); font-size: 18px; margin: 15px 0; font-weight: bold; text-transform: uppercase; }
    .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
    .prediction-box { font-size: 48px; font-weight: bold; text-align: center; margin: 10px 0; transition: 0.3s; }
    .status-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 11px; margin-top: 15px; color: #888; border-top: 1px solid #222; padding-top: 10px; }
    .highlight { color: var(--primary); font-weight: bold; }
    .table-container { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 12px; background: #151515; color: var(--primary); }
    td { padding: 12px; text-align: center; border-bottom: 1px solid #111; }
    .red { color: var(--loss); font-weight: bold; } 
    .green { color: var(--win); font-weight: bold; }
    .gold { color: var(--accent); }
    .footer { font-size: 10px; text-align: center; margin-top: 20px; color: #555; padding-bottom: 30px; }
  </style>
</head>
<body>

  <div id="loginSection">
    <div class="login-card">
      <h2 style="color:var(--primary); margin:0;">AI CYCLIC SCAN</h2>
      <p style="font-size:12px; color:#888;">92K NODE DEEP ANALYSIS</p>
      <input type="password" id="passInput" placeholder="Enter VIP Key">
      <button onclick="checkLogin()" class="login-btn">INJECT SYSTEM</button>
      <p id="error" style="color:var(--loss); display:none; font-size:12px; margin-top:10px;">Access Denied!</p>
    </div>
  </div>

  <div id="mainApp">
    <div class="header">◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 𝑽𝑰𝑷 °•◈</div>
    <div class="card">
      <div style="display: flex; justify-content: space-between; font-size: 14px;">
        <span>Period: <b id="periodDisplay" class="highlight">----</b></span>
        <span>Timer: <b id="timer" style="color:#fff;">--s</b></span>
      </div>
      <div id="prediction" class="prediction-box">SCANNING</div>
      <div class="status-bar">
        <span>Accuracy: <span id="confPercent" class="highlight">0%</span></span>
        <span>Matches: <span id="matchFound" class="highlight">0</span></span>
        <span>Mode: <span id="trendType" class="highlight">NORMAL</span></span>
        <span>Cycle: <span id="cycleStatus" class="highlight">STABLE</span></span>
      </div>
    </div>
    <div class="table-container">
      <table>
        <thead><tr><th>Period</th><th>Num</th><th>Size</th><th>Result</th></tr></thead>
        <tbody id="logTable"></tbody>
      </table>
    </div>
    <div class="footer">
      AI DATABASE: 30 DAYS SYNC | RECURSIVE PATTERN v4.0<br>
      Developed by: ◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 °•◈
    </div>
  </div>

<script>
const PASS = "Soikat2580";
const LIVE_API = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
let bigDB = []; 
let lastTrackedPeriod = null;
let currentPred = null;
let historyLog = {};

async function checkLogin() {
  if(document.getElementById('passInput').value === PASS) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadDatabase();
  } else { document.getElementById('error').style.display = 'block'; }
}

async function loadDatabase() {
  try {
    const res = await fetch('data.json');
    const data = await res.json();
    bigDB = data.list || data;
    startEngine();
  } catch (e) { startEngine(); }
}

function startEngine() {
  update();
  setInterval(update, 3000);
  setInterval(() => {
    let s = new Date().getSeconds();
    document.getElementById('timer').innerText = (30 - (s % 30)) + "s";
  }, 1000);
}

async function update() {
  try {
    const res = await fetch(`${LIVE_API}?t=${Date.now()}`);
    const json = await res.json();
    if(json.data && json.data.list) {
      processDeepAI(json.data.list);
    }
  } catch (e) {}
}

function processDeepAI(live) {
  const latest = live[0];
  const nextP = (BigInt(latest.issueNumber) + 1n).toString();
  
  // Win/Loss Tracker
  if (lastTrackedPeriod === latest.issueNumber && currentPred) {
    const actual = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
    historyLog[latest.issueNumber] = (currentPred === actual) ? "WIN" : "LOSS";
  }

  // --- CYCLIC PATTERN ENGINE ---
  const patternLengths = [3, 5, 8, 10]; // বিভিন্ন গভীরতায় চেক
  let bW = 0, sW = 0, matches = 0, cycleBoost = 0;
  const currentDay = new Date().getDay();

  patternLengths.forEach(len => {
    const pat = live.slice(0, len).map(x => parseInt(x.number) >= 5 ? 'B' : 'S').join('');
    
    for (let i = 0; i < bigDB.length - (len + 1); i++) {
      let isMatch = true;
      for (let j = 0; j < len; j++) {
        if ((parseInt(bigDB[i+j+1].number) >= 5 ? 'B' : 'S') !== pat[j]) {
          isMatch = false; break;
        }
      }

      if (isMatch) {
        matches++;
        let weight = len * 2;
        
        // ১ দিন আগের (২৮৮০ পিরিয়ড) একই সময়ের ডাটা হলে ওয়েট বাড়িয়ে দাও
        if (i % 2880 < 10) { weight *= 3; cycleBoost++; } 
        // ১ সপ্তাহ আগের (২০১৬০ পিরিয়ড) একই দিনের ডাটা হলে ওয়েট আরও বাড়াও
        if (i % 20160 < 10) { weight *= 5; cycleBoost += 2; }

        if (parseInt(bigDB[i].number) >= 5) bW += weight; else sW += weight;
      }
    }
  });

  let decision = "WAIT";
  let conf = 0;
  if (matches > 0) {
    decision = bW > sW ? "BIG" : "SMALL";
    conf = (Math.max(bW, sW) / (bW + sW)) * 100;
    if (Math.abs(bW - sW) < 5) decision = "SURE WAIT";
  }

  // UI Update
  document.getElementById('periodDisplay').innerText = nextP.slice(-4);
  const pb = document.getElementById('prediction');
  pb.innerText = decision;
  pb.style.color = decision === "BIG" ? "#ff9900" : (decision === "SMALL" ? "#00aaff" : "#fff");
  
  document.getElementById('confPercent').innerText = Math.round(conf) + "%";
  document.getElementById('matchFound').innerText = matches;
  document.getElementById('cycleStatus').innerText = cycleBoost > 0 ? "REPEAT DETECTED" : "STABLE";
  document.getElementById('trendType').innerText = conf > 85 ? "HIGH ACCURACY" : "NORMAL";

  currentPred = decision;
  lastTrackedPeriod = nextP;
  renderTable(live);
}

function renderTable(live) {
  let h = "";
  live.slice(0, 10).forEach(x => {
    const isB = parseInt(x.number) >= 5;
    const res = historyLog[x.issueNumber] || "---";
    h += `<tr><td>${x.issueNumber.slice(-4)}</td><td class="gold">${x.number}</td><td class="${isB?'red':'green'}">${isB?'BIG':'SMALL'}</td><td class="${res==='WIN'?'green':'red'}">${res}</td></tr>`;
  });
  document.getElementById('logTable').innerHTML = h;
}
</script>
</body>
</html>
