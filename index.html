<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 - AI PRO °•◈</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #00ffea;
      --background: #000;
      --card-bg: #111;
      --text-gray: #aaa;
      --error-color: #ff3333;
      --gold: #FFD700;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--background);
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* LOGIN SECTION */
    #loginSection {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(0,255,234,0.1) 0%, rgba(0,0,0,1) 70%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .login-card {
      background: var(--card-bg);
      border: 2px solid var(--primary-color);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 85%;
      max-width: 350px;
    }
    .login-input {
      width: 100%;
      padding: 12px;
      background: #000;
      border: 1px solid #333;
      color: #fff;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      box-sizing: border-box;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--primary-color);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    /* MAIN APP */
    #mainApp { display: none; padding: 10px; }
    .header { font-size: 20px; font-weight: bold; color: var(--primary-color); text-align: center; margin: 15px 0; text-transform: uppercase; }
    
    .card {
      background: var(--card-bg);
      border: 2px solid var(--primary-color);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .prediction-box {
      background: rgba(0, 255, 234, 0.05);
      border: 2px solid var(--primary-color);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: var(--primary-color);
      margin: 10px 0;
    }

    .status-badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      background: #222;
      color: var(--gold);
      display: inline-block;
      margin-bottom: 10px;
    }

    .confidence-bar {
      width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin: 10px 0;
    }
    .confidence-fill { height: 100%; background: var(--primary-color); width: 0%; transition: width 1s; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
    .stat-item { background: #151515; border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
    .stat-val { font-size: 18px; font-weight: bold; color: var(--primary-color); }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { color: var(--primary-color); border-bottom: 1px solid #333; padding: 10px; }
    td { padding: 8px; text-align: center; border-bottom: 1px solid #222; }

    #bigDataStatus { color: var(--gold); text-align: center; font-size: 12px; margin-top: 10px; }
    .red { color: #ff4444; } .green { color: #00ff88; } .violet { color: #ee82ee; }
  </style>
</head>
<body>

  <div id="loginSection">
    <div class="login-card">
      <div class="header">𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊</div>
      <input type="password" id="pass" class="login-input" placeholder="Enter Password">
      <button onclick="checkLogin()" class="login-btn">UNLOCK AI</button>
      <p id="err" style="color:red; display:none; font-size:12px; margin-top:10px;">Incorrect Password!</p>
    </div>
  </div>

  <div id="mainApp">
    <div class="header">◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 °•◈</div>
    
    <div class="card">
      <div style="text-align:center">
        <span class="status-badge" id="dbIndicator">Database: Checking...</span>
        <div style="font-size: 14px; color: var(--text-gray);">Next Period: <span id="nextPeriod" style="color:#fff">--</span></div>
      </div>
      
      <div id="predictionBox" class="prediction-box">INITIALIZING...</div>
      
      <div style="font-size:12px; display:flex; justify-content:space-between;">
        <span>AI Confidence</span>
        <span id="confLabel">0%</span>
      </div>
      <div class="confidence-bar"><div id="confFill" class="confidence-fill"></div></div>
      <div id="patternText" style="font-size:11px; color:var(--text-gray); text-align:center;">Analyzing Global Patterns...</div>
    </div>

    <div class="stats-grid">
      <div class="stat-item"><div>Accuracy</div><div class="stat-val" id="acc">0%</div></div>
      <div class="stat-item"><div>Win Streak</div><div class="stat-val" id="streak">0</div></div>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
      <table id="resTable">
        <thead><tr><th>Period</th><th>Prediction</th><th>Result</th><th>Status</th></tr></thead>
        <tbody id="resBody"></tbody>
      </table>
    </div>

    <div id="bigDataStatus">Developed by: Joy Bahi | Big Data Active</div>
  </div>

<script>
// --- CONFIG & STATE ---
const LIVE_API = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
const GITHUB_DB = 'https://raw.githubusercontent.com/YOUR_USER/YOUR_REPO/main/data.json'; // আপনার লিঙ্কে পরিবর্তন করুন

let state = {
  db: [],
  history: [],
  predictions: [],
  lastIssue: null,
  stats: { w: 0, l: 0, s: 0 }
};

// --- LOGIN ---
function checkLogin() {
  if (document.getElementById('pass').value === '@Soikat5262') {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    startApp();
  } else {
    document.getElementById('err').style.display = 'block';
  }
}

// --- CORE LOGIC ---
async function startApp() {
  await syncDB();
  setInterval(syncDB, 60000); // প্রতি ১ মিনিটে ডাটাবেজ আপডেট হবে
  loop();
  setInterval(loop, 3000); // ৩ সেকেন্ড পরপর লাইভ চেক
}

async function syncDB() {
  const btn = document.getElementById('dbIndicator');
  try {
    const r = await fetch(GITHUB_DB + '?v=' + Date.now());
    const d = await r.json();
    if (d && d.length > 0) {
      state.db = d;
      btn.innerText = `Database: ${d.length} Records`;
      btn.style.color = "lime";
    }
  } catch (e) {
    btn.innerText = "Database: Offline";
    btn.style.color = "red";
    state.db = []; // ডাটা না থাকলে ক্লিয়ার
  }
}

async function loop() {
  try {
    const r = await fetch(LIVE_API + '?t=' + Date.now());
    const data = await r.json();
    if (data.code === 0 && data.data.list) {
      process(data.data.list);
    }
  } catch (e) { console.log("Network Busy..."); }
}

function process(liveList) {
  const current = liveList[0];
  const issue = current.issueNumber;

  if (issue !== state.lastIssue) {
    // সিঙ্ক্রোনাইজেশন: লাইভ ডাটা দিয়ে ডাটা গ্যাপ পূরণ
    state.history = [...liveList, ...state.history].filter((v,i,a)=>a.findIndex(t=>t.issueNumber===v.issueNumber)===i).slice(0, 50);

    // আগের প্রেডিকশন রেজাল্ট চেক
    checkResult(current);

    // নতুন প্রেডিকশন (শুধুমাত্র ডাটাবেজ থাকলে)
    if (state.db.length > 0) {
      const nextP = String(BigInt(issue) + 1n);
      const pred = analyze(liveList);
      
      state.activePred = { issue: nextP, type: pred.type };
      
      document.getElementById('nextPeriod').innerText = nextP;
      document.getElementById('predictionBox').innerText = `🎯 ${pred.type}`;
      document.getElementById('confLabel').innerText = pred.conf + "%";
      document.getElementById('confFill').style.width = pred.conf + "%";
      document.getElementById('patternText').innerText = `Pattern Match: ${pred.matches} sequences found`;
    } else {
      document.getElementById('predictionBox').innerText = "WAITING FOR DB...";
    }
    
    state.lastIssue = issue;
    renderTable();
  }
}

function analyze(live) {
  // শেষ ৩টি প্যাটার্ন (যেমন: BIG-SMALL-BIG)
  const pattern = live.slice(0, 3).map(x => parseInt(x.number) >= 5 ? 'B' : 'S').join('');
  
  let bCount = 0, sCount = 0, matches = 0;

  // ৯২ হাজার ডাটার মধ্যে এই প্যাটার্নটি খোঁজা
  // পারফরম্যান্সের জন্য মোবাইল ব্রাউজারে শেষ ২০,০০০ ডাটা স্ক্যান করা হচ্ছে
  const limit = Math.min(state.db.length, 20000);
  
  for (let i = 0; i < limit - 4; i++) {
    // আপনার JSON এ যদি 'type' ফিল্ড থাকে (B/S)
    const histP = state.db[i+1].type + state.db[i+2].type + state.db[i+3].type;
    if (histP === pattern) {
      matches++;
      state.db[i].type === 'B' ? bCount++ : sCount++;
    }
  }

  const finalType = bCount > sCount ? 'BIG' : 'SMALL';
  const conf = matches > 0 ? Math.round((Math.max(bCount, sCount) / matches) * 100) : 55;

  return { type: finalType, conf: Math.min(conf, 99), matches };
}

function checkResult(current) {
  if (state.activePred && state.activePred.issue === current.issueNumber) {
    const actual = parseInt(current.number) >= 5 ? 'BIG' : 'SMALL';
    const win = state.activePred.type === actual;
    
    state.predictions.unshift({
      issue: state.activePred.issue,
      type: state.activePred.type,
      actual: actual,
      win: win
    });

    if (win) { state.stats.w++; state.stats.s++; } 
    else { state.stats.l++; state.stats.s = 0; }
    
    const acc = Math.round((state.stats.w / (state.stats.w + state.stats.l)) * 100);
    document.getElementById('acc').innerText = acc + "%";
    document.getElementById('streak').innerText = state.stats.s;
  }
}

function renderTable() {
  const body = document.getElementById('resBody');
  body.innerHTML = state.predictions.slice(0, 10).map(p => `
    <tr>
      <td>${p.issue.slice(-4)}</td>
      <td style="color:${p.type==='BIG'?'#ff9900':'#00aaff'}">${p.type}</td>
      <td>${p.actual}</td>
      <td><b style="color:${p.win?'lime':'red'}">${p.win?'WIN':'LOSS'}</b></td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
