<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 - 30S AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffea; --bg: #000; --card: #111; --gold: #FFD700; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
        #loginScreen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { width: 85%; max-width: 320px; text-align: center; border: 2px solid var(--primary); padding: 25px; border-radius: 20px; background: var(--card); }
        .main-app { display: none; padding: 15px; }
        .header { text-align: center; color: var(--primary); font-size: 22px; font-weight: bold; margin: 15px 0; text-transform: uppercase; }
        .stat-badge { font-size: 11px; padding: 4px 10px; border-radius: 50px; background: #222; color: var(--gold); border: 1px solid #333; display: inline-block; margin-bottom: 10px; }
        .pred-card { background: var(--card); border: 2px solid var(--primary); border-radius: 15px; padding: 20px; text-align: center; position: relative; }
        .issue-text { font-size: 14px; color: #aaa; }
        .ai-result { font-size: 45px; font-weight: bold; color: var(--primary); margin: 10px 0; text-shadow: 0 0 15px var(--primary); }
        .conf-box { margin-top: 15px; text-align: left; }
        .conf-bar { height: 8px; background: #222; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 1px solid #333; }
        .conf-fill { height: 100%; background: var(--primary); width: 0%; transition: width 1.5s ease-in-out; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 13px; }
        th { border-bottom: 2px solid #333; padding: 10px; color: var(--primary); }
        td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #222; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
        button { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .win { color: #00ff88; font-weight: bold; }
        .loss { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <div class="header">𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊</div>
        <input type="password" id="pKey" placeholder="Enter Secret Key">
        <button onclick="access()">Verify & Access</button>
        <p id="errMsg" style="color:red; font-size:12px; display:none; margin-top:10px;">Invalid Password!</p>
    </div>
</div>

<div class="main-app" id="app">
    <div class="header">◈•° AI PREDICTOR PRO °•◈</div>
    
    <div class="pred-card">
        <div id="dbIndicator" class="stat-badge">DB Status: Syncing...</div>
        <div class="issue-text">Target Period: <span id="targetIssue" style="color:#fff">---</span></div>
        <div id="aiPrediction" class="ai-result">ANALYZING</div>
        
        <div class="conf-box">
            <div style="display:flex; justify-content:space-between; font-size:12px;">
                <span>AI Probability</span>
                <span id="confNum">0%</span>
            </div>
            <div class="conf-bar"><div id="confFill" class="conf-fill"></div></div>
        </div>
    </div>

    <table>
        <thead><tr><th>Period</th><th>Side</th><th>Actual</th><th>Result</th></tr></thead>
        <tbody id="logBody"></tbody>
    </table>
    
    <div style="text-align:center; color:var(--gold); font-size:10px; margin-top:20px;">Powered by Joy Bahi | 92K Dataset Active</div>
</div>

<script>
// --- CORRECTED GITHUB CONFIG ---
const DB_URL = 'https://raw.githubusercontent.com/boom-short/30sDATABASE/main/data.json'; 
const API_URL = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';

let state = {
    database: [],
    lastProcessed: null,
    pendingBet: null,
    logs: [],
    syncing: false
};

function access() {
    if(document.getElementById('pKey').value === '@Soikat5262') {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        run();
    } else {
        document.getElementById('errMsg').style.display = 'block';
    }
}

async function run() {
    await syncDatabase();
    setInterval(syncDatabase, 45000); // 45 sec DB refresh
    worker();
    setInterval(worker, 2000); // 2 sec API check
}

async function syncDatabase() {
    const indicator = document.getElementById('dbIndicator');
    try {
        const r = await fetch(DB_URL + '?v=' + Date.now());
        const data = await r.json();
        if(data && Array.isArray(data)) {
            state.database = data;
            indicator.innerText = `DB: ${data.length} Records (Synced)`;
            indicator.style.color = "lime";
        }
    } catch (e) {
        indicator.innerText = "DB: Offline / Path Error";
        indicator.style.color = "red";
    }
}

async function worker() {
    if(state.syncing) return;
    state.syncing = true;
    try {
        const r = await fetch(API_URL + '?t=' + Date.now());
        const json = await r.json();
        if(json.code === 0) analyze(json.data.list);
    } catch (e) { console.log("Network Busy"); }
    finally { state.syncing = false; }
}

function analyze(liveList) {
    const latest = liveList[0];
    const currentId = latest.issueNumber;

    if (currentId !== state.lastProcessed) {
        // Result calculation for previous bet
        if(state.pendingBet && state.pendingBet.issue === currentId) {
            const actual = parseInt(latest.number) >= 5 ? 'BIG' : 'SMALL';
            const isWin = state.pendingBet.side === actual;
            state.logs.unshift({
                issue: currentId,
                side: state.pendingBet.side,
                actual: actual,
                res: isWin ? 'WIN' : 'LOSS'
            });
        }

        // Deep Analysis from 92K Data
        if(state.database.length > 0) {
            const nextP = String(BigInt(currentId) + 1n);
            const decision = getDeepMatch(liveList);
            
            state.pendingBet = { issue: nextP, side: decision.side };
            
            document.getElementById('targetIssue').innerText = nextP;
            document.getElementById('aiPrediction').innerText = decision.side;
            document.getElementById('confNum').innerText = decision.conf + "%";
            document.getElementById('confFill').style.width = decision.conf + "%";
        }

        state.lastProcessed = currentId;
        updateTable();
    }
}

function getDeepMatch(live) {
    // বর্তমানের ৩টি প্যাটার্ন (আপনার ডেটা ফরম্যাট অনুযায়ী)
    const pattern = live.slice(0, 3).map(v => parseInt(v.number) >= 5 ? 'B' : 'S').join('');
    
    let bCount = 0, sCount = 0, matches = 0;
    const searchDepth = Math.min(state.database.length, 30000);

    for (let i = 0; i < searchDepth - 4; i++) {
        // ডেটাবেজ থেকে প্যাটার্ন ম্যাচিং (আপনার JSON Key: 'number')
        const d1 = parseInt(state.database[i+1].number) >= 5 ? 'B' : 'S';
        const d2 = parseInt(state.database[i+2].number) >= 5 ? 'B' : 'S';
        const d3 = parseInt(state.database[i+3].number) >= 5 ? 'B' : 'S';
        
        if (d1+d2+d3 === pattern) {
            matches++;
            const next = parseInt(state.database[i].number) >= 5 ? 'B' : 'S';
            next === 'B' ? bCount++ : sCount++;
        }
    }

    const side = bCount > sCount ? 'BIG' : 'SMALL';
    const conf = matches > 0 ? Math.round((Math.max(bCount, sCount) / matches) * 100) : 55;
    
    return { side, conf: Math.min(conf, 98) };
}

function updateTable() {
    const body = document.getElementById('logBody');
    body.innerHTML = state.logs.slice(0, 8).map(l => `
        <tr>
            <td>${l.issue.slice(-4)}</td>
            <td style="color:${l.side==='BIG'?'#ff9900':'#00aaff'}">${l.side}</td>
            <td>${l.actual}</td>
            <td class="${l.res==='WIN'?'win':'loss'}">${l.res}</td>
        </tr>
    `).join('');
}
</script>
</body>
</html>
