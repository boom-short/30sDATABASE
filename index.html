<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 𝑽𝑰𝑷 °•◈</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00ffea; --bg: #050505; --card: #121212; --win: #00ff88; --loss: #ff4444; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    
    #loginSection { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; }
    input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; text-align: center; outline: none; }
    .login-btn { width: 100%; padding: 12px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }

    #mainApp { display: none; width: 100%; max-width: 500px; }
    .header { text-align: center; color: var(--primary); font-size: 18px; margin: 15px 0; text-transform: uppercase; letter-spacing: 2px; }
    
    .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; box-shadow: 0 0 20px rgba(0,255,234,0.1); }
    .prediction-box { font-size: 45px; font-weight: bold; text-align: center; margin: 10px 0; color: var(--primary); text-shadow: 0 0 15px var(--primary); }
    
    .status-bar { display: flex; justify-content: space-between; font-size: 12px; margin-top: 10px; color: #888; }
    .highlight { color: var(--primary); font-weight: bold; }

    .table-container { margin-top: 20px; background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px; background: #151515; color: var(--primary); border-bottom: 2px solid #222; }
    td { padding: 10px; text-align: center; border-bottom: 1px solid #111; }
    .red { color: var(--loss); } .green { color: var(--win); }
  </style>
</head>
<body>

  <div id="loginSection">
    <div class="login-card">
      <h2 style="color:var(--primary); margin:0;">VIP ACCESS</h2>
      <p style="font-size:12px; color:#888;">92K NODE REAL-TIME SCANNER</p>
      <input type="password" id="passInput" placeholder="Enter VIP Key">
      <button onclick="checkLogin()" class="login-btn">INJECT & START</button>
      <p id="error" style="color:var(--loss); display:none; font-size:12px; margin-top:10px;">Access Denied!</p>
    </div>
  </div>

  <div id="mainApp">
    <div class="header">◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 𝑽𝑰𝑷 °•◈</div>

    <div class="card">
      <div style="display: flex; justify-content: space-between; font-size: 14px;">
        <span>Period: <b id="periodDisplay" class="highlight">-</b></span>
        <span>Refresh: <b id="timer" style="color:#fff;">30s</b></span>
      </div>

      <div id="prediction" class="prediction-box">READY</div>

      <div class="status-bar">
        <span>Accuracy: <span id="confPercent" class="highlight">0%</span></span>
        <span>Live Match: <span id="matchFound" class="highlight">0</span></span>
      </div>
      <div style="font-size: 10px; text-align: center; margin-top: 10px; color: #555;">
        SCANNING INTERVAL: 1 SEC | DATA DEPTH: 92,000
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr><th>Period</th><th>Num</th><th>Size</th><th>Result</th></tr>
        </thead>
        <tbody id="logTable"></tbody>
      </table>
    </div>
    <div class="sync-status" id="bigDataStatus">Developed by: ◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 °•◈</div>
  </div>

<script>
const PASS = "@Soikat5262";
const LIVE_API = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
let bigDatabase = []; 

// লগইন এবং ডাটা লোড
async function checkLogin() {
  const pass = document.getElementById('passInput').value;
  if(pass === PASS) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    
    // ডাটাবেজ একবারে মেমরিতে ফেচ করা
    try {
      const res = await fetch('data.json');
      bigDatabase = await res.json();
      if(bigDatabase.list) bigDatabase = bigDatabase.list;
    } catch (e) { console.error("Database failed to load"); }

    startEngine();
  } else {
    document.getElementById('error').style.display = 'block';
  }
}

// প্রতি ১ সেকেন্ডে স্ক্যান করার ইঞ্জিন
function startEngine() {
  // লাইভ ডাটা আপডেট (প্রতি ৪ সেকেন্ডে একবার এপিআই কল করলেই যথেষ্ট)
  fetchLive();
  setInterval(fetchLive, 4000);

  // এনালাইসিস স্ক্যান (প্রতি ১ সেকেন্ডে মেমোরি থেকে)
  setInterval(() => {
    if(window.currentLiveHistory) {
      runDeepScan(window.currentLiveHistory);
    }
  }, 1000);
}

async function fetchLive() {
  try {
    const res = await fetch(`${LIVE_API}?t=${Date.now()}`);
    const json = await res.json();
    if(json.data && json.data.list) {
      window.currentLiveHistory = json.data.list;
    }
  } catch (e) {}
}

function runDeepScan(history) {
  const latest = history[0];
  document.getElementById('periodDisplay').innerText = (BigInt(latest.issueNumber) + 1n).toString().slice(-4);

  // শেষ ৫টি গেমের প্যাটার্ন (Key)
  const currentKey = history.slice(0, 5).map(x => parseInt(x.number) >= 5 ? 'B' : 'S').join('');
  
  let bCount = 0, sCount = 0, matchCount = 0;
  
  // ৯২,০০০ ডাটা ফাস্ট লুপ (Memory Scan)
  const dbLen = bigDatabase.length;
  for (let i = 0; i < dbLen - 6; i++) {
    let pKey = "";
    // অপ্টিমাইজড প্যাটার্ন ম্যাচিং
    for(let j=0; j<5; j++) {
      pKey += parseInt(bigDatabase[i+j+1].number) >= 5 ? 'B' : 'S';
    }
    
    if(pKey === currentKey) {
      matchCount++;
      if(parseInt(bigDatabase[i].number) >= 5) bCount++; else sCount++;
    }
  }

  // রেজাল্ট আপডেট
  let pred = "WAIT";
  let conf = 0;

  if (matchCount > 0) {
    if (bCount > sCount) { pred = "BIG"; conf = (bCount/matchCount)*100; }
    else { pred = "SMALL"; conf = (sCount/matchCount)*100; }
  }

  document.getElementById('prediction').innerText = pred;
  document.getElementById('prediction').style.color = pred === "BIG" ? "#ff9900" : "#00aaff";
  document.getElementById('confPercent').innerText = Math.round(conf) + "%";
  document.getElementById('matchFound').innerText = matchCount;
  
  renderTable(history);
}

function renderTable(history) {
  let html = "";
  history.slice(0, 8).forEach(item => {
    const isB = parseInt(item.number) >= 5;
    html += `<tr><td>${item.issueNumber.slice(-4)}</td><td>${item.number}</td><td class="${isB ? 'red' : 'green'}">${isB ? 'BIG' : 'SMALL'}</td><td style="color:gold">✔</td></tr>`;
  });
  document.getElementById('logTable').innerHTML = html;
}

// ৩০ সেকেন্ড কাউন্টডাউন
setInterval(() => {
  let r = 30 - (new Date().getSeconds() % 30);
  document.getElementById('timer').innerText = r + "s";
}, 1000);
</script>
</body>
</html>
