<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 𝑽𝑰𝑷 °•◈</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00ffea; --bg: #050505; --card: #121212; --win: #00ff88; --loss: #ff4444; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    #loginSection { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 85%; max-width: 350px; }
    input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; text-align: center; outline: none; }
    .login-btn { width: 100%; padding: 12px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
    #mainApp { display: none; width: 100%; max-width: 500px; }
    .header { text-align: center; color: var(--primary); font-size: 18px; margin: 15px 0; font-weight: bold; }
    .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; box-shadow: 0 0 20px rgba(0,255,234,0.1); margin-bottom: 20px; }
    .prediction-box { font-size: 50px; font-weight: bold; text-align: center; margin: 10px 0; transition: 0.3s; }
    .status-bar { display: flex; justify-content: space-between; font-size: 12px; margin-top: 10px; color: #888; }
    .highlight { color: var(--primary); font-weight: bold; }
    .table-container { background: #0a0a0a; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 12px; background: #151515; color: var(--primary); }
    td { padding: 12px; text-align: center; border-bottom: 1px solid #111; }
    .red { color: var(--loss); font-weight: bold; } 
    .green { color: var(--win); font-weight: bold; }
  </style>
</head>
<body>

  <div id="loginSection">
    <div class="login-card">
      <h2 style="color:var(--primary); margin:0;">VIP ACCESS</h2>
      <p style="font-size:12px; color:#888;">ULTRA-SYNC V5.0 ACTIVE</p>
      <input type="password" id="passInput" placeholder="Enter VIP Key">
      <button onclick="checkLogin()" class="login-btn">INJECT & START</button>
      <p id="error" style="color:var(--loss); display:none; font-size:12px; margin-top:10px;">Access Denied!</p>
    </div>
  </div>

  <div id="mainApp">
    <div class="header">◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 𝑽𝑰𝑷 °•◈</div>
    <div class="card">
      <div style="display: flex; justify-content: space-between; font-size: 14px;">
        <span>Period: <b id="periodDisplay" class="highlight">----</b></span>
        <span>Refresh: <b id="timer" style="color:#fff;">--s</b></span>
      </div>
      <div id="prediction" class="prediction-box">SCANNING</div>
      <div class="status-bar">
        <span>Conf: <span id="confPercent" class="highlight">0%</span></span>
        <span>Trend: <span id="trendType" class="highlight">SYNCING</span></span>
      </div>
    </div>
    <div class="table-container">
      <table>
        <thead><tr><th>Period</th><th>Num</th><th>Size</th><th>Result</th></tr></thead>
        <tbody id="logTable"></tbody>
      </table>
    </div>
  </div>

<script>
const PASS = "Soikat2580";
const LIVE_API = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
let bigDB = []; let lastPred = null; let lastPeriod = null; let wlHistory = {};

async function checkLogin() {
  if(document.getElementById('passInput').value === PASS) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    try {
      const res = await fetch('data.json');
      const data = await res.json();
      bigDB = data.list || data;
    } catch (e) { console.log("DB Load Error"); }
    startEngine();
  } else { document.getElementById('error').style.display = 'block'; }
}

function startEngine() {
  fetchData(); setInterval(fetchData, 3000);
  setInterval(() => {
    let r = 30 - (new Date().getSeconds() % 30);
    document.getElementById('timer').innerText = r + "s";
  }, 1000);
}

async function fetchData() {
  try {
    const res = await fetch(`${LIVE_API}?t=${Date.now()}`);
    const json = await res.json();
    if(json.data && json.data.list) {
      const live = json.data.list;
      updateWL(live[0]);
      analyze(live);
    }
  } catch (e) {}
}

function updateWL(latest) {
  if (lastPeriod === latest.issueNumber && lastPred) {
    const act = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
    wlHistory[latest.issueNumber] = (lastPred === act) ? "WIN" : "LOSS";
  }
}

function analyze(live) {
  const latest = live[0];
  const nextP = (BigInt(latest.issueNumber) + 1n).toString();
  document.getElementById('periodDisplay').innerText = nextP.slice(-4);

  // লাইভ ডাটা ও DB মিলাচ্ছি (বেশি রেজাল্ট পাওয়ার জন্য প্যাটার্ন ছোট করা হয়েছে)
  const key = live.slice(0, 3).map(x => parseInt(x.number) >= 5 ? 'B' : 'S').join('');
  let bc = 0, sc = 0, mtch = 0;

  if(bigDB.length > 0) {
    for (let i = 0; i < bigDB.length - 4; i++) {
      let pKey = (parseInt(bigDB[i+1].number) >= 5 ? 'B' : 'S') + (parseInt(bigDB[i+2].number) >= 5 ? 'B' : 'S') + (parseInt(bigDB[i+3].number) >= 5 ? 'B' : 'S');
      if(pKey === key) { mtch++; if(parseInt(bigDB[i].number) >= 5) bc++; else sc++; }
    }
  }

  let pred = "WAIT"; let conf = 0; let trend = "RANDOM";
  
  if (mtch > 0) {
    const bp = (bc/mtch)*100; const sp = (sc/mtch)*100;
    // কনফিডেন্স কমানো হয়েছে যাতে ঘনঘন সিগন্যাল দেয়
    if (bp > 55) { pred = "BIG"; conf = bp; trend = "B-TREND"; }
    else if (sp > 55) { pred = "SMALL"; conf = sp; trend = "S-TREND"; }
  } else {
    // DB না মিললে লাইভ লজিক
    const last3 = live.slice(0,3).map(x => parseInt(x.number) >= 5 ? 'B' : 'S').join('');
    if(last3 === "BBB") { pred = "SMALL"; conf = 60; trend = "BREAK"; }
    else if(last3 === "SSS") { pred = "BIG"; conf = 60; trend = "BREAK"; }
  }

  const pBox = document.getElementById('prediction');
  pBox.innerText = pred;
  pBox.style.color = pred === "BIG" ? "#ff9900" : (pred === "SMALL" ? "#00aaff" : "#00ffea");
  document.getElementById('confPercent').innerText = Math.round(conf) + "%";
  document.getElementById('trendType').innerText = trend;

  if(pred !== "WAIT") { lastPred = pred; lastPeriod = nextP; }
  renderTable(live);
}

function renderTable(live) {
  let h = "";
  live.slice(0, 10).forEach(i => {
    const isB = parseInt(i.number) >= 5;
    const res = wlHistory[i.issueNumber] || "---";
    h += `<tr><td>${i.issueNumber.slice(-4)}</td><td style="color:#ffd700">${i.number}</td><td class="${isB ? 'red' : 'green'}">${isB ? 'BIG' : 'SMALL'}</td><td class="${res === 'WIN' ? 'green' : 'red'}">${res}</td></tr>`;
  });
  document.getElementById('logTable').innerHTML = h;
}
</script>
</body>
      </html>
