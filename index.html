<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>◈•° King Soikat Bahi °•◈</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00ffea; --bg: #080808; --card-bg: #121212;
      --win: #00f281; --loss: #ff3e3e; --violet: #aa00ff;
      --text-dim: #888;
    }
    
    body { 
      font-family: 'Outfit', sans-serif; 
      background: var(--bg); color: #fff; margin: 0; padding: 0; 
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }

    /* Login Section */
    #loginSection {
      width: 90%; max-width: 320px; background: var(--card-bg);
      padding: 30px 20px; border-radius: 20px; border: 1px solid rgba(0, 255, 234, 0.3);
      text-align: center; margin-top: 120px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .login-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; }
    .login-input {
      width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #fff;
      border-radius: 12px; margin-bottom: 15px; text-align: center; box-sizing: border-box; outline: none; font-size: 16px;
    }
    .login-btn {
      width: 100%; padding: 14px; background: var(--primary); color: #000; border: none;
      border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s;
    }
    .login-btn:active { transform: scale(0.95); opacity: 0.8; }

    /* Main App */
    #mainApp { width: 100%; max-width: 450px; display: none; padding: 15px; box-sizing: border-box; }
    .header { text-align: center; font-size: 16px; font-weight: 700; color: var(--primary); letter-spacing: 2px; margin: 15px 0; text-transform: uppercase; }
    
    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
    .stat-pill { background: var(--card-bg); padding: 10px 4px; border-radius: 12px; border: 1px solid #222; text-align: center; }
    .stat-pill div { font-size: 9px; color: var(--text-dim); margin-bottom: 4px; }
    .stat-pill span { font-size: 15px; font-weight: 700; }

    .dashboard { 
        background: var(--card-bg); border-radius: 24px; padding: 20px; 
        border: 1px solid #222; margin-bottom: 20px; position: relative;
        border-bottom: 3px solid var(--primary); 
    }
    .main-row { display: flex; justify-content: space-between; align-items: center; }
    .data-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
    .data-value { font-size: 24px; font-weight: 700; display: block; margin-top: 5px; }
    
    .prediction-highlight { 
        background: #1a1a1a; padding: 12px 18px; border-radius: 15px; 
        text-align: right; border-right: 4px solid var(--primary); 
    }

    .history-card { background: var(--card-bg); border-radius: 20px; border: 1px solid #222; overflow: hidden; margin-bottom: 20px; }
    .tab-nav { display: flex; background: #1a1a1a; padding: 5px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; }
    .tab-btn.active { background: var(--card-bg); color: var(--primary); border-radius: 12px; }

    table { width: 100%; border-collapse: collapse; }
    th { font-size: 10px; color: var(--text-dim); padding: 12px; border-bottom: 1px solid #1a1a1a; text-transform: uppercase; }
    td { padding: 12px; font-size: 13px; border-bottom: 1px solid #1a1a1a; text-align: center; }
    
    .badge-win { color: var(--win); background: rgba(0,242,129,0.1); padding: 4px 8px; border-radius: 6px; font-weight: bold; }
    .badge-loss { color: var(--loss); background: rgba(255,62,62,0.1); padding: 4px 8px; border-radius: 6px; font-weight: bold; }
    .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin: 0 2px; }
    .dot-red { background: var(--loss); } .dot-green { background: var(--win); } .dot-violet { background: var(--violet); }
    
    .footer-credit { 
        text-align: center; color: #FFD700; font-weight: bold; 
        font-size: 13px; padding-bottom: 25px; opacity: 0.9;
    }
  </style>
</head>
<body>

  <div id="loginSection">
    <div class="login-title">◈•° King Soikat Bahi °•◈</div>
    <input type="password" id="passInput" class="login-input" placeholder="Enter Secret Code">
    <button onclick="validate()" class="login-btn">Unlock AI</button>
    <p id="errMsg" style="color: var(--loss); font-size: 12px; margin-top: 10px; display: none;">Wrong Password! Try Again.</p>
  </div>

  <div id="mainApp">
    <div class="header">◈•° King Soikat Bahi °•◈</div>
    
    <div class="stats-bar">
      <div class="stat-pill"><div>WINS</div><span id="stW" style="color:var(--win)">0</span></div>
      <div class="stat-pill"><div>LOSS</div><span id="stL" style="color:var(--loss)">0</span></div>
      <div class="stat-pill"><div>L-STREAK</div><span id="stS" style="color:#ffae00">0</span></div>
      <div class="stat-pill"><div>ACCURACY</div><span id="stA">0%</span></div>
    </div>
    
    <div class="dashboard">
      <div class="main-row">
        <div class="data-group">
          <span class="data-label">Period</span>
          <span id="periodId" class="data-value">----</span>
        </div>
        <div class="prediction-highlight">
          <span class="data-label">Next Target</span>
          <span id="predValue" class="data-value" style="color: var(--primary);">Loading...</span>
          <div style="font-size: 11px; margin-top: 5px;" id="colorHint">Syncing Engine...</div>
        </div>
      </div>
      <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 12px; color: var(--text-dim);">ENGINE: <span style="color:var(--win)">LIVE TREND</span></span>
        <span style="color: var(--primary); font-weight: 700; font-size: 20px;" id="timer">00:00</span>
      </div>
    </div>

    <div class="history-card">
      <div class="tab-nav">
        <button id="tMine" class="tab-btn active" onclick="switchTab('mine')">AI HISTORY</button>
        <button id="tMarket" class="tab-btn" onclick="switchTab('market')">MARKET</button>
      </div>
      <div style="max-height: 350px; overflow-y: auto;">
        <table>
          <thead id="hHead"></thead>
          <tbody id="hBody"></tbody>
        </table>
      </div>
    </div>
    <div class="footer-credit">Developed by: ◈•° King Soikat Bahi °•◈</div>
  </div>

  <script>
    // Password সেট করা হয়েছে এখানে
    function validate() {
        const pass = document.getElementById('passInput').value;
        if(pass === "SoikatVip") { // আপনার পাসওয়ার্ড
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            if (typeof initEngine === "function") initEngine();
        } else {
            const err = document.getElementById('errMsg');
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 2500);
        }
    }
  </script>
  <script src="data.json"></script>
  <script src="engine.js"></script>
</body>
</html>
