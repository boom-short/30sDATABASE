<div id="ai-chat-root" style="position:fixed; bottom:20px; right:20px; z-index:9999;">
    <button onclick="toggleChat()" style="background:var(--primary); border:none; border-radius:50%; width:55px; height:55px; box-shadow:0 0 20px var(--primary); cursor:pointer; font-size:24px;">🤖</button>
    
    <div id="chat-window" style="display:none; position:absolute; bottom:70px; right:0; width:300px; height:420px; background:var(--card); border:1px solid var(--primary); border-radius:15px; flex-direction:column; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div style="background:#1a1a1a; padding:12px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
            <span style="color:var(--primary); font-weight:bold; font-size:14px;">আকাশ AI (Online)</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:#fff; font-size:18px; cursor:pointer;">×</button>
        </div>
        <div id="chat-msgs" style="flex:1; padding:15px; overflow-y:auto; font-size:13px; color:#ddd; display:flex; flex-direction:column; gap:10px;">
            <div style="background:#222; padding:8px; border-radius:8px;">স্বাগতম! আমি আকাশ। আপনাকে কিভাবে সাহায্য করতে পারি?</div>
        </div>
        <div style="padding:10px; background:#111; display:flex; gap:5px;">
            <input type="text" id="aiInput" placeholder="লিখুন..." style="flex:1; padding:10px; border-radius:8px; border:1px solid #333; background:#000; color:#fff; outline:none;">
            <button onclick="sendToAI()" style="background:var(--primary); border:none; padding:10px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">SEND</button>
        </div>
    </div>
</div>

<script>
function toggleChat() {
    const win = document.getElementById('chat-window');
    win.style.display = win.style.display === 'none' ? 'flex' : 'none';
}

async function sendToAI() {
    const input = document.getElementById('aiInput');
    const msgBox = document.getElementById('chat-msgs');
    if(!input.value) return;

    const userText = input.value;
    msgBox.innerHTML += `<div style="align-self:flex-end; background:var(--primary); color:#000; padding:8px; border-radius:8px; max-width:80%;">${userText}</div>`;
    input.value = '';
    msgBox.scrollTop = msgBox.scrollHeight;

    try {
        const response = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: userText})
        });
        const data = await response.json();
        msgBox.innerHTML += `<div style="align-self:flex-start; background:#222; color:#ddd; padding:8px; border-radius:8px; max-width:80%;"><b>আকাশ:</b> ${data.reply}</div>`;
        msgBox.scrollTop = msgBox.scrollHeight;
    } catch(e) {
        msgBox.innerHTML += `<div style="color:red; font-size:10px;">সংযোগ বিচ্ছিন্ন!</div>`;
    }
}
</script>
