<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>◈•° King Soikat Bahi °•◈</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00ffea; --bg: #080808; --card-bg: #121212;
      --win: #00f281; --loss: #ff3e3e; --violet: #aa00ff;
      --text-dim: #888;
    }
    
    body { 
      font-family: 'Outfit', sans-serif; 
      background: var(--bg); color: #fff; margin: 0; padding: 0; 
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }

    /* Login Section */
    #loginSection {
      width: 90%; max-width: 320px; background: var(--card-bg);
      padding: 30px 20px; border-radius: 20px; border: 1px solid rgba(0, 255, 234, 0.3);
      text-align: center; margin-top: 120px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .login-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; }
    .login-input {
      width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #fff;
      border-radius: 12px; margin-bottom: 15px; text-align: center; box-sizing: border-box; outline: none; font-size: 16px;
    }
    .login-btn {
      width: 100%; padding: 14px; background: var(--primary); color: #000; border: none;
      border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s;
    }

    /* Main App */
    #mainApp { width: 100%; max-width: 450px; display: none; padding: 15px; box-sizing: border-box; }
    .header { text-align: center; font-size: 16px; font-weight: 700; color: var(--primary); letter-spacing: 2px; margin: 15px 0; text-transform: uppercase; }
    
    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
    .stat-pill { background: var(--card-bg); padding: 10px 4px; border-radius: 12px; border: 1px solid #222; text-align: center; }
    .stat-pill div { font-size: 9px; color: var(--text-dim); margin-bottom: 4px; }
    .stat-pill span { font-size: 15px; font-weight: 700; }

    .dashboard { 
        background: var(--card-bg); border-radius: 24px; padding: 20px; 
        border: 1px solid #222; margin-bottom: 20px; position: relative;
        border-bottom: 3px solid var(--primary); 
    }
    .main-row { display: flex; justify-content: space-between; align-items: center; }
    .data-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
    .data-value { font-size: 24px; font-weight: 700; display: block; margin-top: 5px; }
    
    .prediction-highlight { 
        background: #1a1a1a; padding: 12px 18px; border-radius: 15px; 
        text-align: right; border-right: 4px solid var(--primary); 
    }

    .history-card { background: var(--card-bg); border-radius: 20px; border: 1px solid #222; overflow: hidden; margin-bottom: 20px; }
    .tab-nav { display: flex; background: #1a1a1a; padding: 5px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; }
    .tab-btn.active { background: var(--card-bg); color: var(--primary); border-radius: 12px; }

    table { width: 100%; border-collapse: collapse; }
    th { font-size: 10px; color: var(--text-dim); padding: 12px; border-bottom: 1px solid #1a1a1a; text-transform: uppercase; }
    td { padding: 12px; font-size: 13px; border-bottom: 1px solid #1a1a1a; text-align: center; }
    
    .badge-win { color: var(--win); background: rgba(0,242,129,0.1); padding: 4px 8px; border-radius: 6px; font-weight: bold; }
    .badge-loss { color: var(--loss); background: rgba(255,62,62,0.1); padding: 4px 8px; border-radius: 6px; font-weight: bold; }
    .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin: 0 2px; }
    .dot-red { background: var(--loss); } .dot-green { background: var(--win); } .dot-violet { background: var(--violet); }
    
    .footer-credit { text-align: center; color: #FFD700; font-weight: bold; font-size: 13px; padding-bottom: 25px; opacity: 0.9; }
  </style>
</head>
<body>

  <div id="loginSection">
    <div class="login-title">◈•° King Soikat Bahi °•◈</div>
    <input type="password" id="passInput" class="login-input" placeholder="Enter Secret Code">
    <button onclick="validate()" class="login-btn">Unlock AI</button>
    <p id="errMsg" style="color: var(--loss); font-size: 12px; margin-top: 10px; display: none;">Wrong Password! Try Again.</p>
  </div>

  <div id="mainApp">
    <div class="header">◈•° King Soikat Bahi °•◈</div>
    
    <div class="stats-bar">
      <div class="stat-pill"><div>WINS</div><span id="stW" style="color:var(--win)">0</span></div>
      <div class="stat-pill"><div>LOSS</div><span id="stL" style="color:var(--loss)">0</span></div>
      <div class="stat-pill"><div>L-STREAK</div><span id="stS" style="color:#ffae00">0</span></div>
      <div class="stat-pill"><div>ACCURACY</div><span id="stA">0%</span></div>
    </div>
    
    <div class="dashboard">
      <div class="main-row">
        <div class="data-group">
          <span class="data-label">Period</span>
          <span id="periodId" class="data-value">----</span>
        </div>
        <div class="prediction-highlight">
          <span class="data-label">Next Target</span>
          <span id="predValue" class="data-value" style="color: var(--primary);">Loading...</span>
          <div style="font-size: 11px; margin-top: 5px;" id="colorHint">Syncing DB...</div>
        </div>
      </div>
      <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 12px; color: var(--text-dim);">DB: <span style="color:var(--win)" id="dbStatus">90K+ LOADED</span></span>
        <span style="color: var(--primary); font-weight: 700; font-size: 20px;" id="timer">00:00</span>
      </div>
    </div>

    <div class="history-card">
      <div class="tab-nav">
        <button id="tMine" class="tab-btn active" onclick="switchTab('mine')">AI HISTORY</button>
        <button id="tMarket" class="tab-btn" onclick="switchTab('market')">MARKET</button>
      </div>
      <div style="max-height: 350px; overflow-y: auto;">
        <table>
          <thead id="hHead"></thead>
          <tbody id="hBody"></tbody>
        </table>
      </div>
    </div>
    <div class="footer-credit">Developed by: ◈•° King Soikat Bahi °•◈</div>
  </div>

  <script>
    // Config & Stats
    const DB_URL = 'https://raw.githubusercontent.com/boom-short/30sDATABASE/main/data.json';
    const API_URL = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
    
    let primaryData = []; 
    let liveData = [];    
    let state = { predictions: [], lastPeriod: null, stats: { w: 0, l: 0 }, streak: 0, currentTab: 'mine' };

    // Login Validation
    function validate() {
        const pass = document.getElementById('passInput').value;
        if(pass === "SoikatVip") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            initEngine();
        } else {
            const err = document.getElementById('errMsg');
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 2500);
        }
    }

    // Binary Search: ৯০ হাজার ডাটায় ১ সেকেন্ডের নিচে সার্চ করবে
    function findRecord(issueNumber) {
        let record = liveData.find(d => d.issueNumber === issueNumber);
        if (record) return record;

        let low = 0, high = primaryData.length - 1;
        while (low <= high) {
            let mid = Math.floor((low + high) / 2);
            if (primaryData[mid].issueNumber === issueNumber) return primaryData[mid];
            if (primaryData[mid].issueNumber < issueNumber) high = mid - 1;
            else low = mid + 1;
        }
        return null;
    }

    async function syncData() {
        try {
            if (primaryData.length === 0) {
                const pRes = await fetch(`${DB_URL}?t=${Date.now()}`);
                primaryData = await pRes.json();
                primaryData.sort((a, b) => b.issueNumber.localeCompare(a.issueNumber));
            }

            const lRes = await fetch(`${API_URL}?t=${Date.now()}`, { cache: 'no-store' });
            const lJson = await lRes.json();
            if (lJson.data && lJson.data.list) liveData = lJson.data.list;

            processLogic();
        } catch (e) { console.log("Syncing..."); }
    }

    function processLogic() {
        let combined = [...liveData, ...primaryData.slice(0, 20)];
        let uniqueLatest = Array.from(new Map(combined.map(i => [i.issueNumber, i])).values())
                                .sort((a, b) => b.issueNumber.localeCompare(a.issueNumber));

        if (uniqueLatest.length === 0) return;
        const currentIssue = uniqueLatest[0].issueNumber;

        // Result Checking
        state.predictions.forEach(p => {
            if (p.status === 'PENDING') {
                const match = findRecord(p.period);
                if (match) {
                    const actual = parseInt(match.number);
                    const win = (p.size === (actual >= 5 ? 'BIG' : 'SMALL'));
                    p.actualNum = actual;
                    p.status = win ? 'WIN' : 'LOSS';
                    if (win) { state.stats.w++; state.streak = 0; }
                    else { state.stats.l++; state.streak++; }
                    updateStatsUI();
                }
            }
        });

        // New Prediction
        if (currentIssue !== state.lastPeriod) {
            const nextIssue = String(BigInt(currentIssue) + 1n);
            const ai = (uniqueLatest.length > 5) ? generateAI(uniqueLatest) : null;
            if (ai && !state.predictions.find(p => p.period === nextIssue)) {
                state.predictions.unshift({ period: nextIssue, size: ai.size, num: ai.num, status: 'PENDING', actualNum: '?' });
                updateMainUI(nextIssue, ai);
            }
            state.lastPeriod = currentIssue;
        }
        renderTable(uniqueLatest);
    }

    function generateAI(history) {
        const lastNum = parseInt(history[0].number);
        const nextSize = lastNum >= 5 ? 'SMALL' : 'BIG'; // ট্রেন্ড রিভার্সাল
        const nextNum = nextSize === 'BIG' ? [5, 6, 8][Math.floor(Math.random()*3)] : [1, 2, 4][Math.floor(Math.random()*3)];
        return { size: nextSize, num: nextNum };
    }

    function updateMainUI(issue, ai) {
        document.getElementById('periodId').textContent = issue.slice(-4);
        const pVal = document.getElementById('predValue');
        pVal.textContent = ai.size;
        pVal.style.color = ai.size === 'BIG' ? '#ffa726' : '#29b6f6';
        const v = getVisual(ai.num);
        document.getElementById('colorHint').innerHTML = `Target: ${ai.num} ${v.dots}`;
    }

    function getVisual(n) {
        n = parseInt(n);
        let dots = '';
        if (n === 0) dots = '<span class="dot dot-red"></span><span class="dot dot-violet"></span>';
        else if (n === 5) dots = '<span class="dot dot-green"></span><span class="dot dot-violet"></span>';
        else if ([1,3,7,9].includes(n)) dots = '<span class="dot dot-green"></span>';
        else dots = '<span class="dot dot-red"></span>';
        return { dots };
    }

    function renderTable(data) {
        const body = document.getElementById('hBody');
        const head = document.getElementById('hHead');
        if(!body) return;
        body.innerHTML = "";
        if (state.currentTab === 'mine') {
            head.innerHTML = "<tr><th>Period</th><th>AI Predict</th><th>Result</th><th>Status</th></tr>";
            state.predictions.slice(0, 15).forEach(i => {
                body.innerHTML += `<tr><td>${i.period.slice(-4)}</td><td style="color:var(--primary)">${i.size}</td><td>${i.actualNum}</td><td><span class="${i.status === 'WIN' ? 'badge-win' : (i.status === 'LOSS' ? 'badge-loss' : '')}">${i.status}</span></td></tr>`;
            });
        } else {
            head.innerHTML = "<tr><th>Period</th><th>Number</th><th>Size</th><th>Color</th></tr>";
            data.slice(0, 15).forEach(m => {
                const sz = parseInt(m.number) >= 5 ? 'BIG' : 'SMALL';
                const v = getVisual(m.number);
                body.innerHTML += `<tr><td>${m.issueNumber.slice(-4)}</td><td>${m.number}</td><td style="color:${sz==='BIG'?'#ffa726':'#29b6f6'}">${sz}</td><td>${v.dots}</td></tr>`;
            });
        }
    }

    function updateStatsUI() {
        const total = state.stats.w + state.stats.l;
        document.getElementById('stW').textContent = state.stats.w;
        document.getElementById('stL').textContent = state.stats.l;
        document.getElementById('stS').textContent = state.streak;
        document.getElementById('stA').textContent = total > 0 ? Math.round((state.stats.w/total)*100)+'%' : '0%';
    }

    function switchTab(t) {
        state.currentTab = t;
        document.getElementById('tMine').classList.toggle('active', t === 'mine');
        document.getElementById('tMarket').classList.toggle('active', t === 'market');
        syncData();
    }

    function initEngine() {
        syncData();
        setInterval(() => {
            const r = 30 - (new Date().getSeconds() % 30);
            document.getElementById('timer').textContent = "00:" + (r < 10 ? "0" + r : r);
            if (r === 29 || r === 1) syncData();
        }, 1000);
    }
  </script>
</body>
</html>
