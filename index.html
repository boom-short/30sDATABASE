<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 - PRO AI °•◈</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #00ffea;
      --background: #000;
      --card-bg: #111;
      --text-gray: #aaa;
      --gold: #FFD700;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--background);
      color: #fff;
      margin: 0; padding: 0;
      display: flex; flex-direction: column;
    }

    /* LOGIN SECTION */
    #loginSection {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(0,255,234,0.1) 0%, rgba(0,0,0,1) 70%);
      display: flex; justify-content: center; align-items: center; z-index: 1000;
    }
    .login-card {
      background: var(--card-bg);
      border: 2px solid var(--primary-color);
      padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px;
    }
    .login-input {
      width: 100%; padding: 12px; background: #000; border: 1px solid #333;
      color: #fff; border-radius: 8px; margin-bottom: 15px; text-align: center; box-sizing: border-box;
    }
    .login-btn {
      width: 100%; padding: 12px; background: var(--primary-color);
      color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
    }

    /* MAIN APP */
    #mainApp { display: none; padding: 10px; }
    .header { font-size: 20px; font-weight: bold; color: var(--primary-color); text-align: center; margin: 15px 0; text-transform: uppercase; }
    
    .card {
      background: var(--card-bg);
      border: 2px solid var(--primary-color);
      border-radius: 12px; padding: 15px; margin-bottom: 15px;
    }

    .prediction-box {
      background: rgba(0, 255, 234, 0.05);
      border: 2px solid var(--primary-color);
      border-radius: 10px; padding: 20px; text-align: center;
      font-size: 24px; font-weight: bold; color: var(--primary-color); margin: 10px 0;
    }

    .status-badge {
      font-size: 11px; padding: 4px 8px; border-radius: 4px;
      background: #222; color: var(--gold); display: inline-block; margin-bottom: 10px;
    }

    .confidence-bar {
      width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 10px 0;
    }
    .confidence-fill { height: 100%; background: var(--primary-color); width: 0%; transition: width 1s; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
    th { color: var(--primary-color); border-bottom: 1px solid #333; padding: 8px; }
    td { padding: 8px; text-align: center; border-bottom: 1px solid #222; }

    #bigDataStatus { color: var(--gold); text-align: center; font-size: 11px; margin-top: 10px; padding-bottom: 20px;}
    .win-text { color: lime; font-weight: bold; }
    .loss-text { color: red; font-weight: bold; }
  </style>
</head>
<body>

  <div id="loginSection">
    <div class="login-card">
      <div class="header">𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊</div>
      <input type="password" id="passInput" class="login-input" placeholder="Enter Password">
      <button onclick="checkLogin()" class="login-btn">LOGIN TO SERVER</button>
      <p id="errorMsg" style="color:red; display:none; font-size:12px; margin-top:10px;">Access Denied!</p>
    </div>
  </div>

  <div id="mainApp">
    <div class="header">◈•° 𝑲𝒊𝒏𝒈 𝑺𝒐𝒊𝒌𝒂𝒕 𝑩𝒂𝒉𝒊 °•◈</div>
    
    <div class="card">
      <div style="text-align:center">
        <span class="status-badge" id="dbStatus">DB: Syncing...</span>
        <div style="font-size: 14px; color: var(--text-gray);">Next Period: <span id="nextPeriod" style="color:#fff">--</span></div>
      </div>
      
      <div id="predictionBox" class="prediction-box">CONNECTING...</div>
      
      <div style="font-size:11px; display:flex; justify-content:space-between; margin-top:5px;">
        <span>AI Confidence Score</span>
        <span id="confVal">0%</span>
      </div>
      <div class="confidence-bar"><div id="confFill" class="confidence-fill"></div></div>
      <div id="patternLog" style="font-size:10px; color:var(--text-gray); text-align:center;">Scanning Database History...</div>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
      <table id="historyTable">
        <thead><tr><th>Period</th><th>AI Bet</th><th>Result</th><th>Status</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>

    <div id="bigDataStatus">Developed by: Joy Bahi | Big Data Engine v2.0</div>
  </div>

<script>
// --- CONFIGURATION (এখানে আপনার GitHub লিঙ্ক বসিয়ে দিয়েছি) ---
const LIVE_API = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
// আপনার ফাইল নেম 'data.json' অনুযায়ী লিঙ্কটি এখানে দিন (আমি উদাহরণ হিসেবে একটি ফরম্যাট রেখেছি)
const GITHUB_DB_URL = 'https://raw.githubusercontent.com/Soikat5262/database/main/data.json'; 

let appState = {
  dbRecords: [],
  liveHistory: [],
  logs: [],
  lastIssue: null,
  activeBet: null,
  isFetching: false
};

// --- LOGIN ---
function checkLogin() {
  const p = document.getElementById('passInput').value;
  if (p === '@Soikat5262') {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    initializeApp();
  } else {
    document.getElementById('errorMsg').style.display = 'block';
  }
}

// --- APP CORE ---
async function initializeApp() {
  await fetchDatabase();
  setInterval(fetchDatabase, 60000); // প্রতি ১ মিনিটে ডাটাবেজ আপডেট
  mainLoop();
  setInterval(mainLoop, 2000); // ২ সেকেন্ড পরপর লাইভ চেক
}

async function fetchDatabase() {
  const badge = document.getElementById('dbStatus');
  try {
    // Cache busting যোগ করা হয়েছে যাতে নতুন ডাটা দ্রুত পায়
    const response = await fetch(GITHUB_DB_URL + '?nocache=' + Date.now());
    const data = await response.json();
    if (data && data.length > 0) {
      appState.dbRecords = data;
      badge.innerText = `DB: ${data.length} Records Active`;
      badge.style.color = "lime";
    } else {
      throw new Error("Empty DB");
    }
  } catch (e) {
    badge.innerText = "DB: Offline / Empty";
    badge.style.color = "red";
    appState.dbRecords = [];
  }
}

async function mainLoop() {
  if (appState.isFetching) return;
  appState.isFetching = true;
  
  try {
    const res = await fetch(LIVE_API + '?t=' + Date.now());
    const json = await res.json();
    if (json.code === 0 && json.data.list) {
      processData(json.data.list);
    }
  } catch (e) { console.error("API Link Error"); }
  finally { appState.isFetching = false; }
}

function processData(liveList) {
  const latest = liveList[0];
  const currentIssue = latest.issueNumber;

  if (currentIssue !== appState.lastIssue) {
    // স্মার্ট সিঙ্ক্রোনাইজেশন: ২-৫ ডাটা গ্যাপ থাকলে পূরণ করবে
    appState.liveHistory = [...liveList, ...appState.liveHistory]
      .filter((v, i, a) => a.findIndex(t => t.issueNumber === v.issueNumber) === i)
      .slice(0, 50);

    // পূর্বের প্রেডিকশন চেক
    checkWinLoss(latest);

    // প্রেডিকশন লজিক (শুধুমাত্র ডাটাবেজে ডাটা থাকলে)
    if (appState.dbRecords.length > 0) {
      const nextIssue = String(BigInt(currentIssue) + 1n);
      const prediction = runBigDataAnalysis(liveList);
      
      appState.activeBet = { issue: nextIssue, type: prediction.type };
      
      // UI Update
      document.getElementById('nextPeriod').innerText = nextIssue;
      document.getElementById('predictionBox').innerText = `🎯 ${prediction.type}`;
      document.getElementById('confVal').innerText = prediction.conf + "%";
      document.getElementById('confFill').style.width = prediction.conf + "%";
      document.getElementById('patternLog').innerText = `Matches Found: ${prediction.matches} in Big Data`;
    } else {
      document.getElementById('predictionBox').innerText = "WAITING FOR DB...";
    }
    
    appState.lastIssue = currentIssue;
    updateUIHistory();
  }
}

function runBigDataAnalysis(live) {
  // বর্তমানের শেষ ৩টি রেজাল্ট প্যাটার্ন তৈরি
  const currentPattern = live.slice(0, 3).map(x => parseInt(x.number) >= 5 ? 'B' : 'S').join('');
  
  let bScore = 0, sScore = 0, matches = 0;

  // ৯২ হাজার ডাটার মধ্যে এই প্যাটার্ন খোঁজা (ব্রাউজার ফ্রেন্ডলি লিমিট)
  const limit = Math.min(appState.dbRecords.length, 30000);
  
  for (let i = 0; i < limit - 5; i++) {
    // ডাটাবেজের ফরম্যাট অনুযায়ী (ধরা হয়েছে টাইপ ফিল্ড আছে)
    const histPattern = appState.dbRecords[i+1].type + appState.dbRecords[i+2].type + appState.dbRecords[i+3].type;
    if (histPattern === currentPattern) {
      matches++;
      appState.dbRecords[i].type === 'B' ? bScore++ : sScore++;
    }
  }

  const finalResult = bScore > sScore ? 'BIG' : 'SMALL';
  let confidence = matches > 0 ? Math.round((Math.max(bScore, sScore) / matches) * 100) : 55;

  return { type: finalResult, conf: Math.min(confidence, 98), matches };
}

function checkWinLoss(latest) {
  if (appState.activeBet && appState.activeBet.issue === latest.issueNumber) {
    const actual = parseInt(latest.number) >= 5 ? 'BIG' : 'SMALL';
    const isWin = appState.activeBet.type === actual;
    
    appState.logs.unshift({
      issue: appState.activeBet.issue,
      bet: appState.activeBet.type,
      actual: actual,
      isWin: isWin
    });
  }
}

function updateUIHistory() {
  const body = document.getElementById('historyBody');
  body.innerHTML = appState.logs.slice(0, 8).map(l => `
    <tr>
      <td>${l.issue.slice(-4)}</td>
      <td style="color:${l.bet==='BIG'?'#ff9900':'#00aaff'}">${l.bet}</td>
      <td>${l.actual}</td>
      <td><span class="${l.isWin?'win-text':'loss-text'}">${l.isWin?'WIN':'LOSS'}</span></td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
